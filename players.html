<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <base href="/">
    <title>HASLEAGUE | Oyuncular</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <div class="page-shell">
        <nav class="site-nav pixel640">
            <div class="brand"><img src="/img/logolar/hasleague.png" alt="" style="width: 7rem;"></div>
            <button class="hamburger" aria-label="Menü">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-links">
                <a href="/index.html">Anasayfa</a>
                <a href="/league.html">HAS Ligi</a>
                <a href="/players.html" class="active">Oyuncular</a>
                <a href="/admin.html">Admin Paneli</a>
            </div>
        </nav>

        <main>
            <section class="page-header">
                <div>
                    <span class="eyebrow">Kadir Has Anadolu Lisesi</span>
                    <h1>Oyuncu İstatistikleri</h1>
                    <p>Turnuvadaki tüm oyuncuların gol, asist ve diğer istatistiklerini takip edin.</p>
                </div>
            </section>

            <section class="league-card">
                <div class="league-card-header">
                    <h2>Oyuncu İstatistikleri</h2>
                    <div class="stat-buttons">
                        <button id="gol-kralligi">Gol Krallığı</button>
                        <button id="asist-kralligi">Asist Krallığı</button>
                    </div>
                </div>
                <div class="table-wrapper">
                    <table class="league-table players-table">
                        <thead>
                            <tr>
                                <th>#</th>
                                <th id="takim-header" class="sortable">Takım</th>
                                <th>Oyuncu</th>
                                <th>Mevki</th>
                                <th id="gol-header" class="sortable">Gol</th>
                                <th id="asist-header" class="sortable">Asist</th>
                            </tr>
                        </thead>
                        <tbody id="players-body"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>
    <script src="/players.js"></script>
    <script>
        // Hamburger menü toggle
        document.addEventListener('DOMContentLoaded', function() {
            const hamburger = document.querySelector('.hamburger');
            const navLinks = document.querySelector('.nav-links');

            if (hamburger && navLinks) {
                hamburger.addEventListener('click', function() {
                    navLinks.classList.toggle('open');
                });

                // Menü dışına tıklandığında kapat
                document.addEventListener('click', function(event) {
                    if (!hamburger.contains(event.target) && !navLinks.contains(event.target)) {
                        navLinks.classList.remove('open');
                    }
                });
            }
        });
    </script>
</body>
</html>
